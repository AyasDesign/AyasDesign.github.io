<!-- Տելեգրամի կոճակի HTML կոդը -->

  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">

  Միացիր Telegram-ին

<!-- CSS կոդը՝ կոճակը վերևի ձախ անկյունում ամրացնելու համար -->
<style>
.telegram-btn-fixed {
  position: fixed; /* Ամրացնում է կոճակը էկրանին */
  top: 20px;       /* Հեռավորությունը վերևի եզրից */
  left: 20px;      /* Հեռավորությունը ձախ եզրից */
  z-index: 9999;   /* Ապահովում է, որ կոճակը լինի բոլոր էլեմենտներից վերևում */
  
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background-color: #24A1DE;
  color: white !important;
  text-decoration: none;
  padding: 12px 20px;
  border-radius: 50px;
  font-family: Arial, sans-serif;
  font-weight: bold;
  font-size: 15px;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
  transition: all 0.3s ease;
}

.telegram-btn-fixed:hover {
  background-color: #1d82b3;
  box-shadow: 0 6px 15px rgba(36, 161, 222, 0.5);
  transform: scale(1.05); /* Մկնիկը վրան բերելիս մի փոքր մեծանում է */
}
</style>
