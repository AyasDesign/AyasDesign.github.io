<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aya's Design - Պորտֆոլիո</title>
    <link rel="stylesheet" href="style.css">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Aya's Design">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log("Service Worker Registered"))
      .catch(err => console.log("SW Register Error:", err));
  }
</script>

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header style="display: flex; align-items: center; justify-content: space-between;">
        <div style="display: flex; align-items: center; gap: 15px;">
            <!-- Տելեգրամի կոճակը տեղադրված է լոգոյից ձախ -->
            <a href="https://t.me/gay_00h" target="_blank" class="telegram-btn-fixed">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M21.922 4.108c-.143-.13-.356-.164-.533-.087l-19 8.222c-.22.095-.347.33-.31.567.037.237.228.419.464.444l4.985.532 2.197 6.425c.074.216.264.366.492.388.024.002.048.003.072.003.203 0 .393-.1.512-.271l2.915-4.17 4.965 3.864c.143.111.332.143.504.086.172-.057.303-.195.352-.37l3.5-12.5c.058-.207-.008-.431-.198-.553zm-13.62 10.99l-.36-4.12 10.15-6.85-8.23 8.94-.04.04c-.03.03-.06.06-.09.09l-1.43 1.9z" fill="white"/>
              </svg>
              Միացիր Telegram-ին
            </a>
            
            <div class="header-blank"></div> 
            <div class="logo-title">Aya's Design</div>
        </div>
        
        <div class="admin-controls" id="adminAuthBtn" style="cursor: pointer;">
            <i class="fa-solid fa-user-gear user-icon"></i>
            <span class="admin-btn">Admin</span>
        </div>
    </header>

    <main class="portfolio-grid" id="portfolioGrid">
        </main>

    <div id="imageModal" class="modal">
        <span class="close-btn">&times;</span>
        <div class="modal-content-wrapper">
            <img class="modal-content" id="modalImg">
            <div id="modalCaption" class="modal-caption"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>

<!-- CSS կոդը՝ կոճակի տեսքի և լոգոյի հետ ճիշտ հավասարվելու համար -->
<style>
.telegram-btn-fixed {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background-color: #24A1DE;
  color: white !important;
  text-decoration: none;
  padding: 8px 16px; /* Մի փոքր փոքրացրել եմ, որ header-ում սիրուն նստի */
  border-radius: 50px;
  font-family: Arial, sans-serif;
  font-weight: bold;
  font-size: 14px;
  box-shadow: 0 4px 6px rgba(36, 161, 222, 0.2);
  transition: all 0.3s ease;
  white-space: nowrap; /* Թույլ չի տալիս տեքստը երկու տող դառնա */
}

.telegram-btn-fixed:hover {
  background-color: #1d82b3;
  box-shadow: 0 6px 12px rgba(36, 161, 222, 0.4);
  transform: scale(1.03);
}
</style>

    
</body>
</html>
