<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aya's Design - Պորտֆոլիո</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <header>
        <div class="header-blank"></div> <div class="logo-title">Aya's Design</div>
        
        <div class="admin-controls" id="adminAuthBtn" style="cursor: pointer;">
            <i class="fa-solid fa-user-gear user-icon"></i>
            <span class="admin-btn">Admin</span>
        </div>
    </header>

    <main class="portfolio-grid" id="portfolioGrid">
        </main>

    <div id="imageModal" class="modal">
        <span class="close-btn">&times;</span>
        <div class="modal-content-wrapper">
            <img class="modal-content" id="modalImg">
            <div id="modalCaption" class="modal-caption"></div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
